guidelines:
- id: CNSC-173
  objective: Third party artefacts and open source libraries are verified
  state: Active
  title: Third-Party Artifact Verification
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - All third party artefacts, open source libraries and any other dependencies should be verified as part of the continuous
    integration pipeline by validating their checksums against a known good source and validating any cryptographic signatures.
    Any software ingested must be scanned using Software Composition Analysis (SCA) and pentesting tools to detect whether
    any vulnerable open-source software is used in the final product.
- id: CNSC-174
  objective: SBOM is required from third party suppliers
  state: Active
  title: Third-Party SBOM Requirements
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Where possible, vendors should be required to provide Software Bills of Materials (SBOMs) containing the explicit details
    of the software and versions used within the supplied product as it provides a clear and direct link to the dependencies.
- id: CNSC-175
  objective: Dependencies between open source components are tracked
  state: Active
  title: Dependency Tracking
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - A register should be maintained of a project’s open source components, dependencies and vulnerabilities to help trace
    any deployed artefacts with new vulnerabilities. One of the most popular open source inventory implementations is OWASP
    Dependency-Track.
- id: CNSC-176
  objective: Libraries are built based upon source code
  state: Active
  title: Source-Based Library Builds
  group: Securing Materials
  applicability:
  - SSCP-v1.0
- id: CNSC-177
  objective: Trusted package managers and repositories are defined and prioritized
  state: Active
  title: Trusted Package Sources
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Organizations should host their own package managers and artefact repositories, and restrict build machines to pull from
    only those sources.
- id: CNSC-178
  objective: An immutable SBOM of the code is generated
  state: Active
  title: Immutable SBOM Generation
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - 'There are currently two well known SBOM specifications: SPDX and CycloneDX'
- id: CNSC-179
  objective: Software is scanned for vulnerabilities
  state: Active
  title: Software Vulnerability Scanning
  group: Securing Materials
  applicability:
  - SSCP-v1.0
- id: CNSC-180
  objective: Software is scanned for license implications
  state: Active
  title: License Compliance Scanning
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Licensing obligations must also be factored into the ingestion process. The Linux Foundation maintains the Open Compliance
    Program which hosts several tools to ensure released software meets legal and regulatory compliance requirements.
- id: CNSC-181
  objective: Software composition analysis is run on ingested software
  state: Active
  title: Software Composition Analysis
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - The SCA tool will attempt to use heuristics to identify the direct and transitive dependencies, and can also serve as
    verification of SBOM content. This data will then be matched against data from a number of data feeds containing vulnerability
    data to highlight any vulnerabilities in the dependent packages.
