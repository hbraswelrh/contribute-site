controls:
    - id: CNSWP-149
      title: Cryptographically guarantee policy adherence
      recommendations:
        - in-toto project that can be used to secure a chain of pipeline stages end-to-end with cryptographic guarantees. Build metadata should be evaluated against the policy template by using tools such as Open Policy Agent.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: "CM-3(6)\tCONFIGURATION CHANGE CONTROL"
              strength: 5
              remarks: "Reference to CM-3(6)\tCONFIGURATION CHANGE CONTROL"
            - reference-id: CRYPTOGRAPHY MANAGEMENT
              strength: 5
              remarks: Reference to CRYPTOGRAPHY MANAGEMENT
    - id: CNSWP-150
      title: Validate environments and dependencies before usage
      recommendations:
        - and any signatures should be validated both in the downloading or ingestion process, and again by the build worker. This should include validating package manager signatures, checking out specific Git commit hashes, and verifying SHA sums of input sources and binaries. After completing this validation, the downloading process should sign all binaries or libraries it is adding to the secure source
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: "CM-3(2)\tCONFIGURATION CHANGE CONTROL"
              strength: 5
              remarks: "Reference to CM-3(2)\tCONFIGURATION CHANGE CONTROL"
            - reference-id: TESTING, VALIDATION, AND DOCUMENTATION OF CHANGES
              strength: 5
              remarks: Reference to TESTING, VALIDATION, AND DOCUMENTATION OF CHANGES
    - id: CNSWP-151
      title: Validate runtime security of build workers
      recommendations:
        - such as seccomp, AppArmor, and SELinux, provides defense in depth against attacks on build infrastructure. High privilege kernel capabilities such as debugger, device, and network attachments should be restricted and monitored.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: CM-3(4)
              strength: 5
