metadata:
  id: CNSWP-securing-artefacts
  description: Guidelines for securing software artifacts through signing, attestation, and encryption.
  author:
    id: tag-sc
    name: TAG Security and Compliance
    type: Software-Assisted
  version: 1.0.0
  mapping-references:
    - id: NIST-800-53
      title: NIST SP 800-53r5
      version: rev5
      url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-53r5.pdf
title: Securing Artefacts
document-type: Best Practice
categories:
  - id: signing-attestation
    title: Signing and Attestation
    description: Guidelines for signing build steps and managing attestations for artifacts.
    guidelines:
      - id: CNSWP-141
        title: Every step in the build process should be signed/attested for process integrity
        objective: SI-7
        rationale:
          risks: []
          outcomes:
            - title: Process Integrity
              description: Ensures integrity of each step in the build process
            - title: Chain of Trust
              description: Establishes cryptographic chain of trust for build processes
        guideline-parts:
          - id: CNSWP-141.1
            title: Build Step Signing
            text: Every step in the build process should be signed and attested, with collective signatures included and the completed artifact itself signed.
            recommendations:
              - "Sign every step in the build process"
              - "Include collective signatures in the final artifact"
              - "Sign the completed artifact and all associated metadata"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: SI-1 POLICY AND PROCEDURES
                strength: 5
                remarks: Reference to SI-1 POLICY AND PROCEDURES
      - id: CNSWP-142
        title: Every step in the build process should verify the previously generated signatures
        objective: SI-7
        rationale:
          risks: []
          outcomes:
            - title: Signature Verification
              description: Ensures all previous steps are verified before proceeding
            - title: Process Compliance
              description: Ensures compliance with build process requirements
        guideline-parts:
          - id: CNSWP-142.1
            title: Signature Verification Process
            text: Every step in the build process should verify previously generated signatures to ensure compliance.
            recommendations:
              - "Verify signatures from previous build steps"
              - "Validate all artifacts using signatures generated by each step"
              - "Ensure compliance with build process requirements"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: SI-1 POLICY AND PROCEDURES
                strength: 5
                remarks: Reference to SI-1 POLICY AND PROCEDURES
      - id: CNSWP-143
        title: Use a framework to manage signing of artefacts
        objective: Implement a framework for managing artifact signing from root to individual teams or developers.
        rationale:
          risks: []
          outcomes:
            - title: Signing Management
              description: Provides structured approach to artifact signing
            - title: Freshness Verification
              description: Allows clients to verify content freshness and protect against update system attacks
        guideline-parts:
          - id: CNSWP-143.1
            title: Signing Framework Implementation
            text: Use a framework to manage signing of artifacts from a single root to individual teams or developers.
            recommendations:
              - "Implement signing framework with hierarchical trust"
              - "Use additional metadata to allow clients to verify freshness of content"
              - "Protect against common attacks on update systems"
              - "Enable clients to use public keys to verify repository contents"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: IA-5 AUTHENTICATOR MANAGEMENT
                strength: 5
                remarks: Reference to IA-5 AUTHENTICATOR MANAGEMENT
      - id: CNSWP-144
        title: Use a store to manage attestations
        objective: Maintain a dedicated store for managing and tracking attestations.
        rationale:
          risks: []
          outcomes:
            - title: Attestation Management
              description: Provides centralized management of attestations
            - title: Audit Trail
              description: Enables tracking and auditing of attestations
        guideline-parts:
          - id: CNSWP-144.1
            title: Attestation Store Implementation
            text: Use a dedicated store to manage and track attestations.
            recommendations:
              - "Use a database or dedicated store such as Grafeas for attestations"
              - "Track all attestations for audit and verification purposes"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: "AC-4(6)\tINFORMATION FLOW ENFORCEMENT"
                strength: 5
                remarks: "Reference to AC-4(6)\tINFORMATION FLOW ENFORCEMENT"
              - reference-id: METADATA
                strength: 5
                remarks: Reference to METADATA
  - id: certification-authorization
    title: Certification and Authorization
    description: Guidelines for limiting certification authority and managing key rotation.
    guidelines:
      - id: CNSWP-145
        title: Limit which artefacts any given party is authorized to certify
        objective: Restrict which artifacts parties are authorized to certify using selective trust delegations.
        rationale:
          risks: []
          outcomes:
            - title: Least Privilege
              description: Ensures parties only certify artifacts they are authorized for
            - title: Compartmentalization
              description: Limits trust and reduces risk through compartmentalization
        guideline-parts:
          - id: CNSWP-145.1
            title: Certification Authorization
            text: Limit which artifacts any given party is authorized to certify using selective trust delegations.
            recommendations:
              - "Use selective trust delegations to restrict certification authority"
              - "Ensure trust expires at predefined intervals unless renewed"
              - "Limit parties to only perform assigned tasks"
              - "Ensure compartmentalization of trust"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: AC-6 LEAST PRIVILEGE
                strength: 5
                remarks: Reference to AC-6 LEAST PRIVILEGE
      - id: CNSWP-146
        title: Rotation and revokation of private keys should be supported
        objective: Implement key rotation and revocation capabilities in the distribution mechanism.
        rationale:
          risks: []
          outcomes:
            - title: Key Security
              description: Enables response to compromised keys
            - title: Key Management
              description: Provides structured approach to key lifecycle management
        guideline-parts:
          - id: CNSWP-146.1
            title: Key Rotation and Revocation
            text: Support rotation and revocation of private keys in the distribution mechanism.
            recommendations:
              - "Build key rotation and revocation into the distribution mechanism"
              - "Use multiple keys for different tasks or roles"
              - "Require threshold of keys for important roles"
              - "Place minimal trust in high-risk keys like those stored online or used in automated roles"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
                strength: 5
                remarks: Reference to SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
  - id: artifact-distribution
    title: Artifact Distribution and Storage
    description: Guidelines for distributing and storing artifacts securely.
    guidelines:
      - id: CNSWP-147
        title: Use a container registry that supports OCI image-spec images
        objective: Use container registries that support OCI image-spec with required security properties.
        rationale:
          risks: []
          outcomes:
            - title: Standard Compliance
              description: Ensures compliance with OCI image specification
            - title: Security Properties
              description: Leverages security properties of OCI image-spec
        guideline-parts:
          - id: CNSWP-147.1
            title: OCI Registry Selection
            text: Use a container registry that supports OCI image-spec images with the security properties described in this section.
            recommendations:
              - "Select container registries supporting OCI image-spec"
              - "Ensure registry supports required security properties"
      - id: CNSWP-148
        title: Encrypt artefacts before distribution & ensure only authorized platforms have decryption capabilities
        objective: |
          SC-13 CRYPTOGRAPHIC PROTECTION
          SC-8 TRANSMISSION CONFIDENTIALITY AND INTEGRITY
          IA-5 AUTHENTICATOR MANAGEMENT
          SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
        rationale:
          risks: []
          outcomes:
            - title: Confidentiality
              description: Ensures artifacts are only accessible by authorized parties
            - title: Access Control
              description: Limits decryption to authorized platforms only
        guideline-parts:
          - id: CNSWP-148.1
            title: Artifact Encryption
            text: Encrypt artifacts before distribution so they are accessible only by authorized parties.
            recommendations:
              - "Encrypt artifacts before distribution"
              - "Ensure only authorized parties (clusters, vulnerability scanners, etc.) can decrypt"
              - "Use key management and distribution systems with identity and attestation mechanisms (e.g. SPIFFE/SPIRE)"
              - "Useful for compliance use cases such as geo-fencing or export control and digital rights media management"
        guideline-mappings:
          - reference-id: NIST-800-53
            entries:
              - reference-id: SC-28(1)
                strength: 5
              - reference-id: CRYPTOGRAPHIC PROTECTION
                strength: 5
                remarks: Reference to CRYPTOGRAPHIC PROTECTION
