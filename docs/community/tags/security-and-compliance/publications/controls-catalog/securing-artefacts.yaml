title: Securing Artefacts
description: Securing Artefacts
controls:
    - id: CNSWP-141
      title: Every step in the build process should be signed/attested for process integrity
      objective: SI-7
      recommendations:
        - should include these collective signatures and itself be signed to give integrity to the completed artefact and all its associated metadata.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: SI-1 POLICY AND PROCEDURES
              strength: 5
              remarks: Reference to SI-1 POLICY AND PROCEDURES
    - id: CNSWP-142
      title: Every step in the build process should verify the previously generated signatures
      objective: SI-7
      recommendations:
        - artefacts should all be validated using the signatures generated by each step in its build process to ensure compliance
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: SI-1 POLICY AND PROCEDURES
              strength: 5
              remarks: Reference to SI-1 POLICY AND PROCEDURES
    - id: CNSWP-143
      title: Use a framework to manage signing of artefacts.
      recommendations:
        - from a single root to the individual teams or developers who sign artefacts. It uses additional metadata to allow clients to verify the freshness of content in a repository and protect against common attacks on update systems48. Clients can make use of public keys to verify the contents of the repository.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: IA-5 AUTHENTICATOR MANAGEMENT
              strength: 5
              remarks: Reference to IA-5 AUTHENTICATOR MANAGEMENT
    - id: CNSWP-144
      title: Use a store to manage attestations
      recommendations:
        - needs to be stored and tracked for which a database or a dedicated store such as Grafeas can be used.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: "AC-4(6)\tINFORMATION FLOW ENFORCEMENT"
              strength: 5
              remarks: "Reference to AC-4(6)\tINFORMATION FLOW ENFORCEMENT"
            - reference-id: METADATA
              strength: 5
              remarks: Reference to METADATA
    - id: CNSWP-145
      title: Limit which artefacts any given party is authorized to certify
      recommendations:
        - to certify should be restricted using selective trust delegations. Trust must expire at predefined intervals, unless renewed as weel as a party must only be trusted to perform the tasks assigned to it to ensure compartmentatlization
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: AC-6 LEAST PRIVILEGE
              strength: 5
              remarks: Reference to AC-6 LEAST PRIVILEGE
    - id: CNSWP-146
      title: Rotation and revokation of private keys should be supported
      recommendations:
        - and revoke private keys must be built into the distribution mechanism. Additionally, multiple keys must be used for different tasks or roles, and a threshold of keys must be required for important roles. Finally, minimal trust must be placed in high-risk keys like those that are stored online or used in automated roles.
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
              strength: 5
              remarks: Reference to SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
    - id: CNSWP-147
      title: Use a container registry that supports OCI image-spec images
      recommendations:
        - with the security properties described in this section.
    - id: CNSWP-148
      title: Encrypt artefacts before distribution & ensure only authorized platforms have decryption capabilities
      objective: |
        SC-13 CRYPTOGRAPHIC PROTECTION
        SC-8 TRANSMISSION CONFIDENTIALITY AND INTEGRITY
        IA-5 AUTHENTICATOR MANAGEMENT
        SC-12 CRYPTOGRAPHIC KEY ESTABLISHMENT AND MANAGEMENT
      recommendations:
        - artefacts can be encrypted so that they are accessible by authorized parties, such as the clusters, vulnerability scanners, etc. t is recommended organizations use key management and distribution systems with identity and attestation mechanisms (e.g. SPIFFE/SPIRE)
      guideline-mappings:
        - reference-id: NIST-800-53
          entries:
            - reference-id: SC-28(1)"
              strength: 5
            - reference-id: CRYPTOGRAPHIC PROTECTION
              strength: 5
              remarks: Reference to CRYPTOGRAPHIC PROTECTION
