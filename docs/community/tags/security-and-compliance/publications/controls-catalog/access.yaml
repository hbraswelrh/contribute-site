guidelines:
- id: CNSWP-1
  title: Secrets are injected at runtime
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-5(7)
      remarks: Authenticator Management
  family: Access
  statements:
  - id: CNSWP-1.1
    text: Inject secrets at runtime rather than embedding them in code or configuration files.
- id: CNSWP-15
  title: HSMs are used to physically protect cryptographic secrets with an encryption key residing in the HSM
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-4(4)
      remarks: Information Flow Enforcement
  family: Access
  statements:
  - id: CNSWP-15.1
    title: HSM Implementation
    text: Use HSMs to physically protect cryptographic secrets.
- id: CNSWP-16
  title: Secrets should have a short expiration period or time to live
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-12
      remarks: Information Management and Retention
  family: Access
  statements:
  - id: CNSWP-16.1
    text: Configure secrets with short expiration periods or time-to-live values.
- id: CNSWP-17
  title: time to live and expiration period on secrets is verified to prevent reuse
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-16(3)
      remarks: Security and Privacy Attributes
  family: Access
  statements:
  - id: CNSWP-17.1
    text: Verify secret expiration and time-to-live values to prevent reuse of expired secrets.
- id: CNSWP-18
  title: secrets management systems are highly available
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(1)
      remarks: Cryptographic Key Establishment and Management
  family: Access
  statements:
  - id: CNSWP-18.1
    text: Implement secrets management systems are highly available.
- id: CNSWP-19
  title: long-lived secrets adhere to periodic rotation and revocation
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-12
      remarks: Information Management and Retention
  family: Access
  statements:
  - id: CNSWP-19.1
    title: Long-Lived Secret Management
    text: Manage long-lived secrets through periodic rotation and revocation.
- id: CNSWP-20
  title: Secrets are distributed through secured communication channels protected commensurate with the level of access or data they are protecting
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-16
      remarks: Security and Privacy Atributes
  family: Access
  statements:
  - id: CNSWP-20.1
    text: Use secure communication channels for secret distribution with protection appropriate to the sensitivity level.
- id: CNSWP-21
  title: Secrets injected are runtime are masqued or dropped from logs, audit, or system dumps
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AU-9(3)
      remarks: Protection of Audit Information
  family: Access
  statements:
  - id: CNSWP-21.1
    title: Secret Masking
    text: Mask or drop secrets from logs, audit, or system dumps.
- id: CNSWP-2
  title: Applications and workloads are explicitly authorized to communicate with each other using mutual authentication
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-9
  family: Access
  statements:
  - id: CNSWP-2.1
    text: Use mutual authentication to verify the identity of both communicating parties.
- id: CNSWP-6
  title: Authentication and authorization are determined independently
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-2(6)
      remarks: Identification and Authentication (Organizational Users)
  family: Access
  statements:
  - id: CNSWP-6.1
    text: Determine authentication and authorization independently.
- id: CNSWP-7
  title: Authentication and authorization are enforced independently
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-2(6)
      remarks: Identification and Authentication (Organizational Users)
  family: Access
  statements:
  - id: CNSWP-7.1
    text: Enforce authentication and authorization independently.
- id: CNSWP-12
  title: All cluster and workloads operators are authenticated
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-7
      remarks: Cryptographic Module Authentication
  family: Access
  statements:
  - id: CNSWP-12.1
    text: Implement all cluster and workloads operators are authenticated.
- id: CNSWP-13
  title: cluster and worklods operate actions are evaluated against access control policies governing context, purpose, and output
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-7
      remarks: Cryptographic Module Authentication
  family: Access
  statements:
  - id: CNSWP-13.1
    text: Implement cluster and worklods operate actions are evaluated against access control policies governing context, purpose, and output.
- id: CNSWP-14
  title: Identity federation uses multi-factor authentication
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-2(1)(2)
      remarks: Identification and Authentication (organizational Users)
  family: Access
  statements:
  - id: CNSWP-14.1
    text: Enforce multi-factor authentication for repository access.
- id: CNSWP-10
  title: ABAC and RBAC are used
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-3(13)
      remarks: Access Enforcement
  family: Access
  statements:
  - id: CNSWP-10.1
    text: Implement abac and rbac are used.
- id: CNSWP-11
  title: End user identity is capable of being accepted, consumed, and forwarded on for contextual or dynamic authorization
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7(19)
      remarks: Boundary Protection
  family: Access
  statements:
  - id: CNSWP-11.1
    title: Identity Forwarding Implementation
    text: Enable end user identity to be accepted, consumed, and forwarded.
- id: CNSWP-8
  title: access control and file permissions are updated in real-time
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4(2)
      remarks: System Monitoring
  family: Access
  statements:
  - id: CNSWP-8.1
    title: Real-Time Access Control
    text: Update access control and file permissions in real-time.
- id: CNSWP-9
  title: authorization for workloads is granted based on attributs and roles/permissions previously assigned
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-3(13)
      remarks: Access Enforcement
  family: Access
  statements:
  - id: CNSWP-9.1
    text: Implement authorization for workloads is granted based on attributs and roles/permissions previously assigned.
- id: CNSWP-3
  title: Keys are rotated frequently
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12
      remarks: Cryptographic Key Establishment and Management
  family: Access
  statements:
  - id: CNSWP-3.1
    text: Implement keys are rotated frequently.
- id: CNSWP-4
  title: Key lifespan is short
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(3)
      remarks: Cryptographic Key Establishment and Management
  family: Access
  statements:
  - id: CNSWP-4.1
    text: Implement key lifespan is short.
- id: CNSWP-5
  title: Credentials and keys protecting sensitive workloads (health/finance/etc) are generated and managed independent of a cloud service provider
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-2(12)
      remarks: Identification and Authentication (Organizational Users)
  family: Access
  statements:
  - id: CNSWP-5.1
    title: Independent Key Management
    text: Generate and manage credentials and keys independent of cloud service providers.
