guidelines:
- id: CNSWP-100
  title: Registries require mutually authenticated TLS for all registry connections
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-3(1)
      remarks: Cryptographic Bidirectional Authentication
  family: Distribute
  statements:
  - id: CNSWP-100.1
    text: Require mutually authenticated TLS for all registry connections.
- id: CNSWP-112
  title: pulls from public registries are controlled and only from authorized engineers or internal registries
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-6(3)
      remarks: Least Privilege
  family: Distribute
  statements:
  - id: CNSWP-112.1
    text: Implement pulls from public registries are controlled and only from authorized engineers or internal registries.
- id: CNSWP-79
  title: Trust is verified
  family: Distribute
- id: CNSWP-80
  title: Artifacts ready for deployment are managed in a staging or pre-prod registry
  family: Distribute
- id: CNSWP-84
  title: Artifacts undergoing active development are held in a private registery
  family: Distribute
- id: CNSWP-101
  title: image and metadata are signed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-101.1
    text: Sign images and artifacts to ensure integrity and authenticity.
- id: CNSWP-102
  title: configuration is signed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-102.1
    text: Sign configuration files to ensure integrity.
- id: CNSWP-103
  title: package is signed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-103.1
    text: Sign packages to verify integrity and authenticity.
- id: CNSWP-104
  title: Validate integrity of images
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: System and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-104.1
    text: Implement validate integrity of images.
- id: CNSWP-106
  title: Enable image signing key revokation in the event of compromise
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: System and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-106.1
    text: Implement enable image signing key revokation in the event of compromise.
- id: CNSWP-89
  title: Sign pipeline metadata
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-89.1
    text: Sign pipeline metadata to ensure integrity.
- id: CNSWP-105
  title: Scan images for vulnerabilities and malware
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: RA-5
      remarks: Vulnerability Monitoring and Scanning
  family: Distribute
  statements:
  - id: CNSWP-105.1
    text: Scan artifacts for vulnerabilities before distribution or deployment.
- id: CNSWP-109
  title: Container image scanning findings are acted upon
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-2(3)
      remarks: System and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-109.1
    text: Scan artifacts for vulnerabilities before distribution or deployment.
- id: CNSWP-114
  title: At-risk applications are prioritized for remediation by the exploit maturity and vulnerable path presence in addition to the CVSS score
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-2(3)
      remarks: System and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-114.1
    text: Implement at-risk applications are prioritized for remediation by the exploit maturity and vulnerable path presence in addition to the cvss score.
- id: CNSWP-91
  title: Images are scanned within the CI pipeline
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: RA-5
      remarks: Vulnerability Monitoring and Scanning
  family: Distribute
  statements:
  - id: CNSWP-91.1
    text: Scan artifacts for vulnerabilities before distribution or deployment.
- id: CNSWP-107
  title: Security updates are prioritized
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-2(3)
      remarks: System and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-107.1
    text: Implement security updates are prioritized.
- id: CNSWP-108
  title: HSMs or credential managers should be used for protecting credentials
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(3)
      remarks: Systems and Communication Protection
  family: Distribute
  statements:
  - id: CNSWP-108.1
    text: Use hardware security modules to physically protect cryptographic secrets.
- id: CNSWP-113
  title: Image encryption is coupled with key management attestation and/or authorization and credential distribution
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(2)
      remarks: Cryptographic Key Establishment and Management
  family: Distribute
  statements:
  - id: CNSWP-113.1
    title: Encryption and Key Management
    text: Couple image encryption with key management, attestation, and authorization.
- id: CNSWP-110
  title: organizational compliance rules are enforced
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: PL-1
      remarks: Policy and Procedures
  family: Distribute
  statements:
  - id: CNSWP-110.1
    text: Implement organizational compliance rules are enforced.
- id: CNSWP-92
  title: Vulnerability scans are coupled with pipeline compliance rules
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-1
      remarks: Policy and Procedures
  family: Distribute
  statements:
  - id: CNSWP-92.1
    title: Compliance Integration
    text: Couple vulnerability scans with pipeline compliance rules.
- id: CNSWP-111
  title: Incremental hardening of the infrastructure is employed
  family: Distribute
- id: CNSWP-81
  title: container images are hardened following best practices
  family: Distribute
  statements:
  - id: CNSWP-81.1
    title: Image Hardening Practices
    text: Harden container images following security best practices.
- id: CNSWP-82
  title: Static application security testing (SAST) is performed
  family: Distribute
  statements:
  - id: CNSWP-82.1
    title: SAST Implementation
    text: Perform static application security testing.
- id: CNSWP-85
  title: Scan application manifests in CI pipeline
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: RA-5
      remarks: Vulnerability Monitoring and Scanning
  family: Distribute
  statements:
  - id: CNSWP-85.1
    text: Scan artifacts for vulnerabilities before distribution or deployment.
- id: CNSWP-86
  title: CI server's for sensitive workloads are isolated from other workloads
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-39
      remarks: Process Isolation
  family: Distribute
  statements:
  - id: CNSWP-86.1
    text: Implement ci server's for sensitive workloads are isolated from other workloads.
- id: CNSWP-87
  title: Builds requiring elevated privileges must run on dedicated servers
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-39
      remarks: Process Isolation
  family: Distribute
  statements:
  - id: CNSWP-87.1
    text: Implement builds requiring elevated privileges must run on dedicated servers.
- id: CNSWP-88
  title: Build policies are enforced on the CI pipeline
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-1
      remarks: Policy and Procedures
  family: Distribute
  statements:
  - id: CNSWP-88.1
    text: Implement build policies are enforced on the ci pipeline.
- id: CNSWP-90
  title: Build stages are verified prior to the next stage executing
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Distribute
  statements:
  - id: CNSWP-90.1
    text: Implement build stages are verified prior to the next stage executing.
- id: CNSWP-93
  title: Dynamic application security testing (DAST) is performed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-11(8)
      remarks: (8) & (9) Interactive Application Security Testing
  family: Distribute
  statements:
  - id: CNSWP-93.1
    title: DAST Implementation
    text: Perform dynamic application security testing.
- id: CNSWP-94
  title: Application instrumentation is employed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Distribute
  statements:
  - id: CNSWP-94.1
    text: Implement application instrumentation is employed.
- id: CNSWP-95
  title: Automated test results map back to requirements
  family: Distribute
  statements:
  - id: CNSWP-95.1
    title: Test Mapping
    text: Map automated test results back to requirements.
- id: CNSWP-96
  title: Infrastructure security tests must be employed
  family: Distribute
  statements:
  - id: CNSWP-96.1
    title: Infrastructure Testing
    text: Employ infrastructure security tests.
- id: CNSWP-97
  title: Tests to verify the security health are executed at time of build and at time of deploy
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Distribute
  statements:
  - id: CNSWP-97.1
    title: Security Health Testing
    text: Execute security health tests at build and deploy time.
- id: CNSWP-98
  title: IaC is subject to the same pipeline policy controls as application code
  family: Distribute
- id: CNSWP-99
  title: Security testing is automated
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-11
      remarks: Developer Testing and Evaluation
  family: Distribute
  statements:
  - id: CNSWP-99.1
    text: Implement security testing is automated.
- id: CNSWP-83
  title: Test suites follow the test pyramid
  family: Distribute
