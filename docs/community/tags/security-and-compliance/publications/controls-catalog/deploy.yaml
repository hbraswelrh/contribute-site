  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SR-4(3)
      remarks: (3) Provenance
  family: Deploy
  statements:
  - id: CNSWP-59.1
    text: Sign images and artifacts to ensure integrity and authenticity.
- id: CNSWP-58
  title: Image runtime policies are enforced prior to deployment
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7(17)
      remarks: (17) Software, Firmware, and Information Integrity
  family: Deploy
  statements:
  - id: CNSWP-58.1
    text: Implement image runtime policies are enforced prior to deployment.
- id: CNSWP-60
