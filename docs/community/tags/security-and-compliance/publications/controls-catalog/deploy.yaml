guidelines:
- id: CNSWP-57
  title: trust confirmation verifies the image has a valid signature from an authorized source
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SR-4(3)
      remarks: (3) Provenance
  family: Deploy
  statements:
  - id: CNSWP-57.1
    text: Sign images and artifacts to ensure integrity and authenticity.
- id: CNSWP-59
