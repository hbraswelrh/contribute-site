guidelines:
- id: CNSWP-115
  title: Network policies enforce east-west network communication within the container deployment is limited to only that which is authorized for access
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-6(3)
      remarks: Least Privilege
  family: Security Assurance
  statements:
  - id: CNSWP-115.1
    text: Implement network policies enforce east-west network communication within the container deployment is limited to only that which is authorized for access.
- id: CNSWP-126
  title: Orchestrator network policies are used in conjunction with a service mesh
  family: Security Assurance
- id: CNSWP-116
  title: Incident reponse considers cloud native workloads
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IR-4
      remarks: Incident Handling
  family: Security Assurance
  statements:
  - id: CNSWP-116.1
    title: Cloud Native Considerations
    text: Incident response must consider cloud native workload characteristics.
- id: CNSWP-117
  title: Incident response accounts for appropriate evidence handling and collection of coud native workloads
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IR-5(1)
      remarks: Incident Monitoring
  family: Security Assurance
  statements:
  - id: CNSWP-117.1
    text: Implement incident response accounts for appropriate evidence handling and collection of coud native workloads.
- id: CNSWP-118
  title: Rootless builds are employed
  family: Security Assurance
- id: CNSWP-119
  title: cgroups and system groups are used to isolate workloads and deployments
  family: Security Assurance
- id: CNSWP-120
  title: MAC implementations are employed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-3(3)
      remarks: Access Enforcement
  family: Security Assurance
  statements:
  - id: CNSWP-120.1
    title: MAC Implementation
    text: Use Mandatory Access Control (MAC) implementations for workload security.
- id: CNSWP-121
  title: Threat model code and infrastructure
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-11(2)
      remarks: Developer Testing and Evaluation
  family: Security Assurance
  statements:
  - id: CNSWP-121.1
    text: Implement threat model code and infrastructure.
- id: CNSWP-122
  title: Entities are able to independently authenticate other identities
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-9
      remarks: Service Identification and Authentication
  family: Security Assurance
  statements:
  - id: CNSWP-122.1
    title: Independent Authentication
    text: Entities should be able to independently authenticate other identities.
- id: CNSWP-123
  title: Each entity can create proof of who the identity is
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-9
      remarks: Service Identification and Authentication
  family: Security Assurance
  statements:
  - id: CNSWP-123.1
    text: Implement each entity can create proof of who the identity is.
- id: CNSWP-124
  title: Orchestrator is running on an a trusted OS, BIOS, etc
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-14
      remarks: Signed Components
  family: Security Assurance
  statements:
  - id: CNSWP-124.1
    text: Implement orchestrator is running on an a trusted os, bios, etc.
- id: CNSWP-125
  title: Orchestrator verifies the claims of a container
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-6
      remarks: Security and Privacy Function Verification
  family: Security Assurance
  statements:
  - id: CNSWP-125.1
    text: Implement orchestrator verifies the claims of a container.
