title: Compute
document-type: Best Practice
families:
- id: Compute
  title: Compute
  description: Guidelines for securing compute infrastructure including bootstrapping, isolation, monitoring, and runtime security.
guidelines:
- id: CNSWP-22
  title: Bootstrapping is employed to verify correct physical and logical location of compute
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7(9)
      remarks: Software, Firmware, and Information Integrity
  family: Compute
  statements:
  - id: CNSWP-22.1
    title: Bootstrapping Implementation
    text: Implement bootstrapping to verify compute location and boot integrity.
- id: CNSWP-27
  title: The hardware root of trust is based in a Trusted Platform Module (TPM) or virtual TPM (vTPM)
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Compute
  statements:
  - id: CNSWP-27.1
    title: Root of Trust Implementation
    text: Base hardware root of trust in TPM or vTPM.
- id: CNSWP-23
  title: Disparate data sensitive workloads are not run on the same OS kernel
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Compute
  statements:
  - id: CNSWP-23.1
    title: Workload Separation
    text: Separate disparate data sensitive workloads to prevent running on the same OS kernel.
- id: CNSWP-26
  title: Container specific operating systems are in use
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-2
  family: Compute
  statements:
  - id: CNSWP-26.1
    title: Container OS Implementation
    text: Use container-specific operating systems.
- id: CNSWP-56
  title: Serverless functions are run in tenant-based resource or performance isolation for similar data classifications
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7(21)
      remarks: Boundary Protection
  family: Compute
  statements:
  - id: CNSWP-56.1
    title: Serverless Isolation
    text: Run serverless functions in tenant-based resource or performance isolation.
- id: CNSWP-24
  title: Monitor and detect any changes to the initial configurations made in runtime
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-2(2)
      remarks: Baseline Configuration
    - reference-id: CM-3(7)
  family: Compute
  statements:
  - id: CNSWP-24.1
    title: Configuration Monitoring
    text: Monitor and detect changes to initial configurations made at runtime.
- id: CNSWP-25
  title: API auditing is enabled with a filter for a specific set of API Groups or verbs
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AU-2
      remarks: Event Logging
  family: Compute
  statements:
  - id: CNSWP-25.1
    title: API Auditing Implementation
    text: Enable API auditing with filters for specific API Groups or verbs.
- id: CNSWP-30
  title: Systems processing alerts are periodically tuned for false positives
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4(13)
      remarks: System Monitoring
  family: Compute
  statements:
  - id: CNSWP-30.1
    title: Alert Tuning
    text: Periodically tune alert systems to reduce false positives.
- id: CNSWP-43
  title: Actionable audit events are generates that correlate/contextualize data from logs into "information" that can drive decision trees/incident response
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AU-3
      remarks: Content of Audit Records
  family: Compute
  statements:
  - id: CNSWP-43.1
    text: Implement actionable audit events are generates that correlate/contextualize data from logs into "information" that can drive decision trees/incident response.
- id: CNSWP-28
  title: Minimize administrative access to the control plane
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-6
      remarks: Least Privilege
  family: Compute
  statements:
  - id: CNSWP-28.1
    title: Access Minimization
    text: Minimize administrative access to the control plane.
- id: CNSWP-44
  title: segregation of duties and the principle of least privilege is enforced
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-6
      remarks: Least Privilege
  family: Compute
  statements:
  - id: CNSWP-44.1
    text: Implement segregation of duties and the principle of least privilege is enforced.
- id: CNSWP-29
  title: Object level and resource requests and limits are controlled through cgroups
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7(16)
      remarks: Software, Firmware, and Information Integrity
  family: Compute
  statements:
  - id: CNSWP-29.1
    title: Resource Control Implementation
    text: Control object level and resource requests and limits through cgroups.
- id: CNSWP-31
  title: All orchestrator control plane components are configured to communicate via mutual authentication and certificate validation with a periodically rotated certificate
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-3
      remarks: Access Enforcement
  family: Compute
  statements:
  - id: CNSWP-31.1
    title: Control Plane Communication
    text: Configure all orchestrator control plane components for secure communication.
- id: CNSWP-32
  title: Only sanctioned capabilities and system calls (e.g. seccomp filters), are allowed to execute or be invoked in a container by the host operating system
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-2
  family: Compute
  statements:
  - id: CNSWP-32.1
    title: System Call Restriction
    text: Restrict capabilities and system calls allowed in containers.
- id: CNSWP-51
  title: Processes must execute only functions explicitly defined in an allow list
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-2
  family: Compute
  statements:
  - id: CNSWP-51.1
    text: Implement processes must execute only functions explicitly defined in an allow list.
- id: CNSWP-33
  title: Changes to critical mount points and files are prevented, monitored, and alerted
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-5
      remarks: Access Restrictions for Change
  family: Compute
  statements:
  - id: CNSWP-33.1
    text: Implement changes to critical mount points and files are prevented, monitored, and alerted.
- id: CNSWP-34
  title: Runtime configuration control prevents changes to binaries, certificates, and remote access configurations
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-5
      remarks: Access Restrictions for Change
  family: Compute
  statements:
  - id: CNSWP-34.1
    text: Implement runtime configuration control prevents changes to binaries, certificates, and remote access configurations.
- id: CNSWP-52
  title: Functions are not be allowed to make changes to critical file system mount points
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-5
      remarks: Access Restrictions for Change
  family: Compute
  statements:
  - id: CNSWP-52.1
    text: Implement functions are not be allowed to make changes to critical file system mount points.
- id: CNSWP-35
  title: Runtime configuration prevents ingress and egress network access for containers to only what is required to operate
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Compute
  statements:
  - id: CNSWP-35.1
    text: Implement runtime configuration prevents ingress and egress network access for containers to only what is required to operate.
- id: CNSWP-36
  title: Policies are defined that restrict communications to only occur between sanctioned microservice pairs
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Compute
  statements:
  - id: CNSWP-36.1
    text: Implement policies are defined that restrict communications to only occur between sanctioned microservice pairs.
- id: CNSWP-39
  title: Use a service mesh that eliminates implicit trust through data-in-motion encryption (data in transit)
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Compute
  statements:
  - id: CNSWP-39.1
    text: Implement use a service mesh that eliminates implicit trust through data-in-motion encryption (data in transit).
- id: CNSWP-48
  title: Network traffic to malicious domains is detected and denied
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Compute
  statements:
  - id: CNSWP-48.1
    text: Implement network traffic to malicious domains is detected and denied.
- id: CNSWP-54
  title: Egress network connection is monitored to detect and prevent access to C&C (command and control) and other malicious network domains
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Compute
  statements:
  - id: CNSWP-54.1
    text: Implement egress network connection is monitored to detect and prevent access to c&c (command and control) and other malicious network domains.
- id: CNSWP-55
  title: Ingress network inspection is employed detect and remove malicious payloads and commands
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Compute
  statements:
  - id: CNSWP-55.1
    title: Network Inspection
    text: Employ ingress network inspection to detect and remove malicious payloads.
- id: CNSWP-37
  title: Use a policy agent to control and enforce authorized, signed container images
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-5
      remarks: Access Restrictions for Change
  family: Compute
  statements:
  - id: CNSWP-37.1
    text: Sign images and artifacts to ensure integrity and authenticity.
- id: CNSWP-38
  title: Use a policy agent to control provenance assurance for operational workloads
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-5
      remarks: Access Restrictions for Change
  family: Compute
  statements:
  - id: CNSWP-38.1
    text: Implement use a policy agent to control provenance assurance for operational workloads.
- id: CNSWP-45
  title: Non-compliant violations are detected based on a pre-configured set of rules that filter violations of the organization's policies
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and Information Integrity
  family: Compute
  statements:
  - id: CNSWP-45.1
    text: Implement non-compliant violations are detected based on a pre-configured set of rules that filter violations of the organization's policies.
- id: CNSWP-53
  title: Function access is only permitted to sanctioned services
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-2
  family: Compute
  statements:
  - id: CNSWP-53.1
    title: Service Access Restriction
    text: Restrict function access to only sanctioned services.
- id: CNSWP-40
  title: Use components that detect, track, aggregate and report system calls and network traffic from a container
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-4
      remarks: System Monitoring
  family: Compute
  statements:
  - id: CNSWP-40.1
    title: Monitoring Implementation
    text: Use components to detect, track, aggregate and report system calls and network traffic.
- id: CNSWP-41
  title: Workloads should be dynamically scanned to detect malicious or insidious behavior for which no known occurrence yet exists
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-3
      remarks: Malicious Code Protection
  family: Compute
  statements:
  - id: CNSWP-41.1
    title: Dynamic Scanning
    text: Dynamically scan workloads to detect malicious or insidious behavior.
- id: CNSWP-42
  title: Environments are continuously scanned to detect new vulnerabilities in workloads
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: RA-5
      remarks: Vulnerability Monitoring and Scanning
  family: Compute
  statements:
  - id: CNSWP-42.1
    title: Continuous Scanning
    text: Continuously scan environments to detect new vulnerabilities.
- id: CNSWP-46
  title: Native secret stores encrypt with keys from an external Key Management Store (KMS)
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(3)
      remarks: Systems & Communication Protection
  family: Compute
  statements:
  - id: CNSWP-46.1
    text: Implement native secret stores encrypt with keys from an external key management store (kms).
- id: CNSWP-47
  title: Native secret stores are not configured for base64 encoding or stored in clear-text in the key-value store by default
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(3)
      remarks: Systems & Communication Protection
  family: Compute
  statements:
  - id: CNSWP-47.1
    title: Secret Storage
    text: Ensure native secret stores do not use base64 encoding or clear-text storage.
- id: CNSWP-49
  title: Use encrypted containers for sensitive sources, methods, and data
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-28
      remarks: Protection of Information at Rest
  family: Compute
  statements:
  - id: CNSWP-49.1
    text: Implement use encrypted containers for sensitive sources, methods, and data.
- id: CNSWP-50
  title: Use SBOMs to identify current deployments of vulnerable libraries, dependencies, and packages
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-8
      remarks: System Component Inventory
  family: Compute
  statements:
  - id: CNSWP-50.1
    text: Implement use sboms to identify current deployments of vulnerable libraries, dependencies, and packages.
