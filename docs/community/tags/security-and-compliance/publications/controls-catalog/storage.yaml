guidelines:
- id: CNSWP-127
  title: Storage control plane management interface requires mutual authentication and TLS for connections
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-8
      remarks: Transmission Confidentiality and Integrity
  family: Storage
  statements:
  - id: CNSWP-127.1
    text: Use mutual authentication to verify the identity of both communicating parties.
- id: CNSWP-128
  title: Data availability is achieved through parity or mirroring, erasure coding or replicas
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-13
      remarks: Predictable Failure Prevention
  family: Storage
  statements:
  - id: CNSWP-128.1
    text: Implement data availability is achieved through parity or mirroring, erasure coding or replicas.
- id: CNSWP-129
  title: Hashing and checksums are added to blocks, objects or files
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-7
      remarks: Least Functionality
  family: Storage
  statements:
  - id: CNSWP-129.1
    title: Integrity Protection
    text: Add hashing and checksums to blocks, objects or files to detect tampering of data.
- id: CNSWP-130
  title: Data backup storage locations employ like access controls and security policies to that of the data storage source
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-9
      remarks: External System Services
  family: Storage
  statements:
  - id: CNSWP-130.1
    text: Implement data backup storage locations employ like access controls and security policies to that of the data storage source.
- id: CNSWP-131
  title: Secure erasure adhering to OPAL standards is employed for returned or non-functional devices
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CP-9
      remarks: System Backup
  family: Storage
  statements:
  - id: CNSWP-131.1
    text: Implement secure erasure adhering to opal standards is employed for returned or non-functional devices.
- id: CNSWP-132
  title: Encryption at rest considers data path, size, and frequency of access when determing additional security protections and cryptographic algorithms to employ
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-28
      remarks: Protection of Information at Rest
  family: Storage
  statements:
  - id: CNSWP-132.1
    title: Encryption Strategy
    text: Consider data path, size, and frequency of access when determining encryption approach.
- id: CNSWP-133
  title: Caching is considered for determining encryption requirements in archictures
  family: Storage
- id: CNSWP-134
  title: Namespaces have defined trust boundaries to cordon access to volumes
  family: Storage
- id: CNSWP-135
  title: Security policies are used to prevent containers from accessing volume mounts on worker nodes
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Storage
  statements:
  - id: CNSWP-135.1
    text: Implement security policies are used to prevent containers from accessing volume mounts on worker nodes.
- id: CNSWP-136
  title: Security policies are used enforce authorized worker node access to volumes
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-7
      remarks: Boundary Protection
  family: Storage
  statements:
  - id: CNSWP-136.1
    text: Implement security policies are used enforce authorized worker node access to volumes.
- id: CNSWP-137
  title: Volume UID and GID are inaccessible to containers
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-4
      remarks: Information Flow Enforcement
  family: Storage
  statements:
  - id: CNSWP-137.1
    text: Implement volume uid and gid are inaccessible to containers.
- id: CNSWP-138
  title: Artifact registry supports OCI artifacts
  family: Storage
- id: CNSWP-139
  title: Artifact registry supports signed artifacts
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: CM-14
      remarks: Signed Components
  family: Storage
  statements:
  - id: CNSWP-139.1
    text: Sign images and artifacts to ensure integrity and authenticity.
- id: CNSWP-140
  title: Artifact registry verifies artifacts against organizational policies
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AU-10
      remarks: Non-repudiation
  family: Storage
  statements:
  - id: CNSWP-140.1
    text: Implement artifact registry verifies artifacts against organizational policies.
