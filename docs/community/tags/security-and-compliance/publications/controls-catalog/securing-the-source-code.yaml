guidelines:
- id: CNSWP-182
  title: Commits and tags are signed
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SI-7
      remarks: Software, Firmware, and information integrity
  family: Securing the Source Code
  statements:
  - id: CNSWP-182.1
    title: Signing Implementation
    text: GPG keys or S/MIME certificates are used to sign the source code.
- id: CNSWP-183
  title: Enforce full attestation and verification for protected branches
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-6(3)
      remarks: Least Privilege
  family: Securing the Source Code
  statements:
  - id: CNSWP-183.1
    title: Branch Protection Configuration
    text: Branch protection is enabled on the mainline and release branches with force push disabled.
- id: CNSWP-184
  title: Secrets are not committed to the source code repository unless encrypted
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SC-12(3)
      remarks: Systems and Communication Protection
  family: Securing the Source Code
  statements:
  - id: CNSWP-184.1
    title: Secret Detection and Prevention
    text: Implement tooling to detect secrets or to prevent certain files from being pushed which may contain plaintext sensitive materials.
- id: CNSWP-185
  title: The individuals or teams with write access to a repository are defined
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: PL-1
      remarks: Policy and Procedures
  family: Securing the Source Code
  statements:
  - id: CNSWP-185.1
    title: Access Definition
    text: Implement CODEOWNERS (or equivalent) to define who has write access and responsibility for different parts of the codebase.
- id: CNSWP-188
  title: Define roles aligned to functional responsibilities
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: PL-1
      remarks: Policy and Procedures
  family: Securing the Source Code
  statements:
  - id: CNSWP-188.1
    title: Role Definitions
    text: Define and document roles with specific responsibilities and access levels.
- id: CNSWP-191
  title: Enforce MFA for accessing source code repositories
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: IA-2(1)
      remarks: Identification and Authentication (organizational Users)
  family: Securing the Source Code
  statements:
  - id: CNSWP-191.1
    text: Implement enforce mfa for accessing source code repositories.
- id: CNSWP-192
  title: Use SSH keys to provide developers access to source code repositories
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-1
      remarks: Remote Access
  family: Securing the Source Code
  statements:
  - id: CNSWP-192.1
    text: Implement use ssh keys to provide developers access to source code repositories.
- id: CNSWP-186
  title: Automate software security scanning and testing
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: RA-5
      remarks: Vulnerability Monitoring and Scanning
  family: Securing the Source Code
  statements:
  - id: CNSWP-186.1
    title: Security Scanning Implementation
    text: Security specific scans should be performed, including Static Application Security Tests (SAST) and Dynamic Application Security Tests (DAST).
- id: CNSWP-187
  title: Establish and adhere to contribution policies
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: PL-1
      remarks: Policy and Procedures
  family: Securing the Source Code
  statements:
  - id: CNSWP-187.1
    title: Policy Definition
    text: Define configuration options or configuration rules within SCM platforms allow repository administrators to enforce security, hygiene and operational policies.
- id: CNSWP-189
  title: Enforce an independent four-eyes principle
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-11
      remarks: Developer Testing and Evaluation
  family: Securing the Source Code
  statements:
  - id: CNSWP-189.1
    title: Review Requirements
    text: Require independent review and approval by reviewers with equal or greater expertise.
- id: CNSWP-190
  title: Use branch protection rules
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: SA-8
      remarks: Security Engineering Principles
  family: Securing the Source Code
  statements:
  - id: CNSWP-190.1
    title: Branch Protection Configuration
    text: Protection rules can be used to enforce the usage of pull requests with specified precondition and approval rules.
- id: CNSWP-193
  title: Have a key rotation policy
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-2(1)
      remarks: Prerequisites and criteria for group and role membership are defined.
  family: Securing the Source Code
  statements:
  - id: CNSWP-193.1
    title: Key Rotation Requirements
    text: Keys should be rotated after a certain period of time or when compromised.
- id: CNSWP-194
  title: Use short-lived/ephemeral credentials for machine/service access
  guideline-mappings:
  - reference-id: NIST-800-53
    entries:
    - reference-id: AC-2(1)
      remarks: Usage of automated mechanisms to create, enable, modify, disable, and remove accounts.
  family: Securing the Source Code
  statements:
  - id: CNSWP-194.1
    title: Ephemeral Credential Implementation
    text: Use short-lived access tokens for CI/CD pipeline agents and service access.
