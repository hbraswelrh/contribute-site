title: Cloud Native Security Controls Catalog
type: Best Practice
metadata:
  id: CNSC
  type: GuidanceCatalog
  gemara-version: '1.3.0'
  description: Guidelines for access control, authentication, authorization, secrets management, and key management.
  author:
    id: tag-sc
    name: TAG Security and Compliance
    type: Software Assisted
  version: 1.1.0
  mapping-references:
  - id: NIST-800-53
    title: NIST SP 800-53r5
    version: rev5
    url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-53r5.pdf
  - id: CNSC-CSV
    title: Originating copy of the Controls Catalog (Apache 2.0 License)
    version: v1.0.0
    url: https://github.com/cloud-native-security-controls/controls-catalog
  applicability-groups:
  - id: CNSWP-v1.0
    title: Cloud Native Security Whitepaper v1.0
    description: Controls originating from the Cloud Native Security Whitepaper version 1.0
  - id: CNSWP-v2.0
    title: Cloud Native Security Whitepaper v2.0
    description: Controls originating from the Cloud Native Security Whitepaper version 2.0
  - id: SSCP-v1.0
    title: Software Supply Chain Best Practices v1.0
    description: Controls originating from the Software Supply Chain Best Practices Paper version 1.0
groups:
- id: Access
  title: Access Control
  description: Guidelines for access control models and identity forwarding.
- id: Compute
  title: Compute
  description: Guidelines for securing compute infrastructure including bootstrapping, isolation, monitoring, and runtime security.
- id: Deploy
  title: Deploy
  description: Guidelines for securing software deployments, including artifact verification, runtime policy enforcement, freshness validation, update management, logging, and incident response.
- id: Develop
  title: Develop
  description: Guidelines for secure software development practices including environment segregation, testing, code review, and CI server hardening.
- id: Distribute
  title: Distribute
  description: Guidelines for secure distribution of container images, packages, and artifacts including signing, scanning, and registry security.
- id: Securing Artefacts
  title: Securing Artefacts
  description: Guidelines for securing artefacts, including build process attestation, signing frameworks, key rotation, OCI registry support, and encryption.
- id: Securing Build Pipelines
  title: Securing Build Pipelines
  description: Guidelines for securing build pipelines, ensuring cryptographic guarantees, validation, and secure build environments.
- id: Securing Materials
  title: Securing Materials
  description: Guidelines for securing materials, including third-party artifact verification, SBOM generation, dependency tracking, vulnerability scanning, and software composition analysis.
- id: Securing the Source Code
  title: Securing the Source Code
  description: Guidelines for securing the source code, including commit signing, branch protection, secret prevention, access control, MFA enforcement, and automated security scanning.
- id: Security Assurance
  title: Security Assurance
  description: Guidelines for security assurance, including network policies, incident response, platform hardening, threat modeling, identity management, and GitOps security practices.
- id: Storage
  title: Storage
  description: Guidelines for securing storage, including encryption at rest, data availability, integrity validation, namespace boundaries, access policies, and artifact registry management.
guidelines:
# --- Access ---
- id: CNSC-1
  objective: Secrets are injected at runtime
  title: Runtime Secret Injection
  group: Access
  applicability:
  - CNSWP-v1.0
  see-also:
  - CNSC-21
- id: CNSC-2
  objective: Applications and workloads are explicitly authorized to communicate with each other using mutual authentication
  title: Mutual Authentication
  group: Access
  applicability:
  - CNSWP-v1.0
- id: CNSC-3
  objective: Keys are rotated frequently
  title: Cryptographic Key Management
  group: Access
  applicability:
  - CNSWP-v1.0
- id: CNSC-4
  objective: Key lifespan is short
  title: Cryptographic Key Lifecycle Management
  group: Access
  applicability:
  - CNSWP-v1.0
- id: CNSC-5
  objective: Credentials and keys protecting sensitive workloads (health/finance/etc) are generated and managed independent
    of a cloud service provider
  title: Sensitive Credential Management
  group: Access
  applicability:
  - CNSWP-v1.0
  recommendations:
  - KMS and HMS are common technologies to achieve this. FIPS 140-2 compliance is strongly suggested. Cloud KMS tends to be
    FIPS 140-2 Level 2 or greater.
- id: CNSC-6
  objective: Authentication and authorization are determined independently
  title: Identification and Authentication
  group: Access
  applicability:
  - CNSWP-v1.0
  see-also:
  - CNSC-7
- id: CNSC-7
  objective: Authentication and authorization are enforced independently
  title: Authentication and Authorization Enforcement
  group: Access
  applicability:
  - CNSWP-v1.0
  see-also:
  - CNSC-6
- id: CNSC-8
  objective: Access control and file permissions are updated in real-time
  title: Continuous System Monitoring
  group: Access
  applicability:
  - CNSWP-v1.0
  recommendations:
  - where possible as caching may permit unauthorized access
- id: CNSC-9
  objective: Authorization for workloads is granted based on attributes and roles/permissions previously assigned
  title: Privileged-based Authorization
  group: Access
  applicability:
  - CNSWP-v1.0
  see-also:
  - CNSC-10
- id: CNSC-10
  objective: ABAC and RBAC are used
  title: ABAC and RBAC
  group: Access
  applicability:
  - CNSWP-v1.0
  see-also:
  - CNSC-9
- id: CNSC-11
  objective: End user identity is capable of being accepted, consumed, and forwarded on for contextual or dynamic authorization
  title: Authorization and Identity Management
  group: Access
  applicability:
  - CNSWP-v1.0
  recommendations:
  - This can be achieved through the use of identity documents and tokens.
- id: CNSC-12
  objective: All cluster and workloads operators are authenticated
  title: Cluster Authentication Management
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-13
  objective: Cluster and workloads operate actions are evaluated against access control policies governing context, purpose,
    and output
  title: Authentication Policy Management
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-14
  objective: Identity federation uses multi-factor authentication
  title: Multi-factor Authentication
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-208
- id: CNSC-15
  objective: HSMs are used to physically protect cryptographic secrets with an encryption key residing in the HSM
  title: HSMs Protection of Cryptographic Secrets
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - If this is not possible, software-based credential managers should be used.
  see-also:
  - CNSC-16
  - CNSC-19
- id: CNSC-16
  objective: Secrets should have a short expiration period or time to live
  title: Secrets Management
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Leverage tool-specific capabilities of secret manager
  see-also:
  - CNSC-19
  - CNSC-15
  - CNSC-17
- id: CNSC-17
  objective: Time to live and expiration period on secrets is verified to prevent reuse
  title: Secrets Lifecycle Management
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Leverage tool-specific capabilities of secret manager
  see-also:
  - CNSC-16
  - CNSC-19
- id: CNSC-18
  objective: Secrets management systems are highly available
  title: Secrets Management System
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-19
  objective: Long-lived secrets adhere to periodic rotation and revocation
  title: Secrets Rotation Management
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Long-lived secrets are not recommended, but some capabilities require them
  see-also:
  - CNSC-15
  - CNSC-16
  - CNSC-17
- id: CNSC-20
  objective: Secrets are distributed through secured communication channels protected commensurate with the level of access
    or data they are protecting
  title: Secrets Protection
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-21
  objective: Secrets injected at runtime are masked or dropped from logs, audit, or system dumps
  title: Secret Injection Lifecycle
  group: Access
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Even short lived secrets may be reused if caught in time by an interested attacker. Logs, audit, and systems dumps (i.e.
    in-memory shared volumes instead of environment variables) are all areas where runtime injected secrets show up
  see-also:
  - CNSC-1
- id: CNSC-208
  objective: Identity federation uses multi-factor authentication for human users
  title: Multi-factor Authentication
  group: Access
  applicability:
  - CNSWP-v2.0
  see-also:
  - CNSC-14
# --- Compute ---
- id: CNSC-22
  objective: Bootstrapping is employed to verify correct physical and logical location of compute
  title: Compute Bootstrapping Verification
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Secure Boot with TPM 2.0 or similar control
  see-also:
  - CNSC-27
- id: CNSC-23
  objective: Disparate data sensitive workloads are not run on the same host OS kernel
  title: Boundary Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - 'There are at least three implementing controls possible: workloads may be  separated by running in a separate cluster,
    on a separate node, or by implementing pods in independent VMs. It is also possible to emulate the kernel via an application
    kernel (e.g. gvisor)'
- id: CNSC-24
  objective: Monitor and detect any changes to the initial configurations made in runtime
  title: Runtime Configuration Monitoring
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Preventative controls should be the primary control. Detective controls monitoring  filesystem changes should be used
    to verify primary controls are operating properly.
- id: CNSC-25
  objective: API auditing is enabled with a filter for a specific set of API Groups or verbs
  title: API Auditing Implementation
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - API audits of the application, kubernetes API server, and kernel should be implemented.
- id: CNSC-26
  objective: Container specific operating systems are in use
  title: Operating System Configuration
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - A read-only OS with other services disabled. This provides isolation and resource confinement  that enables developers
    to run isolated applications on a shared host kernel
- id: CNSC-27
  objective: The hardware root of trust is based in a Trusted Platform Module (TPM) or virtual TPM (vTPM)
  title: Trust Implementation
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Ensure HW root of trust extends to the host OS kernel, modules, system images, container runtimes, and all software on
    the system.
  see-also:
  - CNSC-22
- id: CNSC-28
  objective: Minimize administrative access to the control plane
  title: Least Privilege
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Ensure both users and pods have the minimum necessary access
- id: CNSC-29
  objective: Object level and resource requests and limits are controlled through cgroups
  title: Resource Control Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - helps prevent exhaustion of node and cluster level resources by one misbehaving workload due to an intentional (e.g.,
    fork bomb attack or cryptocurrency mining) or unintentional (e.g., reading a large file in memory without input validation,
    horizontal autoscaling to exhaust compute resources) issue
- id: CNSC-30
  objective: Systems processing alerts are periodically tuned for false positives
  title: System Alert Monitoring
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - to avoid alert flooding, fatigue, and false negatives after security incidents that were not detected by the system
- id: CNSC-31
  objective: All orchestrator control plane components are configured to communicate via mutual authentication and certificate
    validation with a periodically rotated certificate
  title: Control Plane Configuration
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - In unfederated clusters, the CA should be used exclusively for the current cluster.
- id: CNSC-32
  objective: Only sanctioned capabilities and system calls (e.g. seccomp filters), are allowed to execute or be invoked in
    a container by the host operating system
  title: Baseline Configured Functionality
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Additional tooling should be installed that go beyond k8s capabilities to limit system calls. E.g. Falco.
- id: CNSC-33
  objective: Changes to critical mount points and files are prevented, monitored, and alerted
  title: Critical Change Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-34
- id: CNSC-34
  objective: Runtime configuration control prevents changes to binaries, certificates, and remote access configurations
  title: Runtime Configuration for Change Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-33
- id: CNSC-35
  objective: Runtime configuration prevents ingress and egress network access for containers to only what is required to operate
  title: Runtime Boundary Protection Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-36
- id: CNSC-36
  objective: Policies are defined that restrict communications to only occur between sanctioned microservice pairs
  title: Boundary Protection Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-35
- id: CNSC-37
  objective: Use a policy agent to control and enforce authorized, signed container images
  title: Policy Enforcement Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-38
- id: CNSC-38
  objective: Use a policy agent to control provenance assurance for operational workloads
  title: Policy Enforcement Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  see-also:
  - CNSC-37
- id: CNSC-39
  objective: Use a service mesh that eliminates implicit trust through data-in-motion encryption (data in transit)
  title: Data Trust Management
  group: Compute
  applicability:
  - CNSWP-v1.0
- id: CNSC-40
  objective: Use components that detect, track, aggregate and report system calls and network traffic from a container
  title: System Monitoring Components
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - should be leveraged to look for unexpected or malicious behavior
- id: CNSC-41
  objective: Workloads should be dynamically scanned to detect malicious or insidious behavior for which no known occurrence
    yet exists
  title: Dynamic Workload Scanning
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Events such as an extended sleep command that executes data exfiltration from etcd after the workload has been running
    for X amount of days are not expected in the majority of environments and therefore are not included in security tests.
    The aspect that workloads can have time or event delayed trojan horses is only detectable by comparing to baseline expected
    behavior, often discovered during thorough activity and scan monitoring
- id: CNSC-42
  objective: Environments are continuously scanned to detect new vulnerabilities in workloads
  title: Continuous Monitoring and Scanning
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Vulnerabilities are constantly being discovered, just because it wasn't vulnerable at deploy, doesn't mean it won't be
    vulnerable in two weeks
- id: CNSC-43
  objective: Actionable audit events are generated that correlate/contextualize data from logs into "information" that can
    drive decision trees/incident response
  title: Audit Event Logging
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-44
  objective: Segregation of duties and the principle of least privilege is enforced
  title: Privilege Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-45
  objective: Non-compliant violations are detected based on a pre-configured set of rules defined by the organization's policies
  title: Information Integrity
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-46
  objective: Native secret stores encrypt with keys from an external Key Management Store (KMS)
  title: Key Management Storage
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-47
  objective: Native secret stores are not configured for base64 encoding or stored in clear-text in the key-value store by
    default
  title: Secret Storage Configuration
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Encoding is not encryption
- id: CNSC-48
  objective: Network traffic to malicious domains is detected and denied
  title: System Monitoring
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-49
  objective: Use encrypted containers for sensitive sources, methods, and data
  title: Sensitive Data Encryption
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-50
  objective: Use SBOMs to identify current deployments of vulnerable libraries, dependencies, and packages
  title: SBOM Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-51
  objective: Processes must execute only functions explicitly defined in an allow list
  title: Functionality Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-52
  objective: Functions are not be allowed to make changes to critical file system mount points
  title: Access and Change Restrictions
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-53
  objective: Function access is only permitted to sanctioned services
  title: Access Configuration
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Either through networking restrictions or least privilege in permission models
- id: CNSC-54
  objective: Egress network connection is monitored to detect and prevent access to C&C (command and control) and other malicious
    network domains
  title: System Monitoring
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-55
  objective: Ingress network inspection is employed detect and remove malicious payloads and commands
  title: System Monitoring Management
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - For instance, SQL injection attacks can be detected using inspection.
- id: CNSC-56
  objective: Serverless functions are run in tenant-based resource or performance isolation for similar data classifications
  title: System Component Isolation
  group: Compute
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - This may impact the performance due to limitations in the address space available to the isolation environment and should
    be considered for only the most sensitive workloads.
- id: CNSC-233
  objective: Use a service mesh that eliminates implicit trust through data-in-motion protection (i.e. confidentiality, integrity,
    authentication, authorization)
  title: Data Trust Management
  group: Compute
  applicability:
  - CNSWP-v2.0
# --- Deploy ---
- id: CNSC-57
  objective: Trust confirmation verifies the image has a valid signature from an authorized source
  title: Trust Confirmation
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-58
  objective: Image runtime policies are enforced prior to deployment
  title: Runtime Policy Enforcement
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-59
  objective: Image integrity and signature are verified prior to deployment
  title: Image Integrity Verification
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-60
  objective: Applications provide logs regarding authentication, authorization, actions, and failures
  title: Application Logging
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-61
  objective: Forensics capabilities are integrated into an incident response plan and procedures
  title: Forensics Integration
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-62
  objective: AI, ML, or statistical modeling are used for behavioural and heuristic environment analysis to detect unwanted
    activities
  title: Behavioral Analysis
  group: Deploy
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-170
  objective: Clients can perform verification of artefacts and associated metadata
  title: Artifact Verification
  group: Deploy
  applicability:
  - SSCP-v1.0
- id: CNSC-171
  objective: Clients can verify the freshness of files
  title: Freshness Verification
  group: Deploy
  applicability:
  - SSCP-v1.0
  recommendations:
  - Ensure clients can access latest versions and can verify if the provided files are out of date
- id: CNSC-172
  objective: A framework is used for managing software updates
  title: Update Framework
  group: Deploy
  applicability:
  - SSCP-v1.0
  recommendations:
  - Consider using The Update Framework (TUF) to enforce the updating of software. TUF is a specification for delivering software
    updates in a secure, reliable and trusted way
# --- Develop ---
- id: CNSC-63
  objective: A dedicated production environment is established
  title: Production Environment
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Ensure that production workloads are in a separate, dedicated environment from non-production workloads. In the context
    of containers, this can mean separate clusters. In the case of VMs, separate networks.
- id: CNSC-64
  objective: Dynamic deployments are leveraged for safer releases
  title: Dynamic Deployments
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Blue/Green, Alpha/Beta, Canary, red-black deployments
- id: CNSC-65
  objective: Vulnerability and configuration scanning is integrated in the IDE or at the pull request
  title: Early Vulnerability Scanning
  group: Develop
  applicability:
  - CNSWP-v1.0
- id: CNSC-66
  objective: Dedicated development, testing, and production environments are established
  title: Environment Segregation
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-67
  objective: Tests are built for business-critical code
  title: Business-Critical Code Testing
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-68
  objective: Tests are built for business-critical infrastructure
  title: Infrastructure Testing
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-69
  objective: Test suites are able to be run locally
  title: Local Test Execution
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-70
  objective: Test suites are available to run in a shared environment
  title: Shared Test Execution
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-71
  objective: Two non-author reviewers or approvers are required prior to merging
  title: Code Review Requirements
  group: Develop
  applicability:
  - CNSWP-v1.0
- id: CNSC-72
  objective: Code is clean and well commented
  title: Code Quality
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-73
  objective: Full infrastructure tests are used
  title: Full Infrastructure Testing
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-74
  objective: Regression tests are used
  title: Regression Testing
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-75
  objective: Test suites are updated against new and emerging threats and developed into security regression tests
  title: Security Regression Testing
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-76
  objective: A dedicated testing environment is established
  title: Testing Environment
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-77
  objective: Continuous integration server is isolated
  title: CI Server Isolation
  group: Develop
  applicability:
  - CNSWP-v1.0
- id: CNSC-78
  objective: Threat model results are used to determine ROI for test development
  title: Threat-Informed Test Development
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
- id: CNSC-195
  objective: Secure configuration is implemented as the default state of the system
  title: Secure Configuration Defaults
  group: Develop
  applicability:
