# --- Securing Artefacts ---
- id: CNSC-141
  objective: Every step in the build process is signed and attested for process integrity
  title: Build Process Attestation
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - The signing of artefacts should be performed at each stage of its life cycle. The final artefact bundle should include
    these collective signatures and itself be signed to give integrity to the completed artefact and all its associated metadata.
- id: CNSC-142
  objective: Every step in the build process verifies previously generated signatures
  title: Build Signature Verification
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - The integrity and provenance of images, deployment configuration, and application packages included in artefacts should
    all be validated using the signatures generated by each step in its build process to ensure compliance
- id: CNSC-143
  objective: A framework is used to manage signing of artefacts
  title: Artifact Signing Framework
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - Consider TUF/notary to sign OCI images. Notary makes use of a "root-of-trust" model to delegate trust from a single root
    to the individual teams or developers who sign artefacts. It uses additional metadata to allow clients to verify the freshness
    of content in a repository and protect against common attacks on update systems. Clients can make use of public keys to
    verify the contents of the repository.
- id: CNSC-144
  objective: A store is used to manage attestations
  title: Attestation Store
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - Consider storing in-toto attestations in OCI registries alongside the image. Generated in-toto metadata needs to be stored
    and tracked for which a database or a dedicated store such as Grafeas can be used.
- id: CNSC-145
  objective: Artefacts any given party is authorized to certify are limited
  title: Certification Authorization
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - Trust should not be granted universally or indefinitely. Artefacts or metadata that a given party is trusted to certify
    should be restricted using selective trust delegations. Trust must expire at predefined intervals, unless renewed as weel
    as a party must only be trusted to perform the tasks assigned to it to ensure compartmentatlization
- id: CNSC-146
  objective: Rotation and revocation of private keys is supported
  title: Key Rotation and Revocation
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - The system must be prepared for when, not if, its private keys are compromised. The ability to rotate and revoke private
    keys must be built into the distribution mechanism. Additionally, multiple keys must be used for different tasks or roles,
    and a threshold of keys must be required for important roles. Finally, minimal trust must be placed in high-risk keys
    like those that are stored online or used in automated roles.
- id: CNSC-147
  objective: A container registry that supports OCI image-spec images is used
  title: OCI Registry Support
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - An internal image registry should be deployed and configured to support internal artefact distribution with the security
    properties described in this section.
- id: CNSC-148
  objective: Artefacts are encrypted before distribution and only authorized platforms have decryption capabilities
  title: Artifact Encryption
  group: Securing Artefacts
  applicability:
  - SSCP-v1.0
  recommendations:
  - Ensure contents of the artefact remain confidential in transit and at rest, until it is consumed. These artefacts can
    be encrypted so that they are accessible by authorized parties, such as the clusters, vulnerability scanners, etc. t is
    recommended organizations use key management and distribution systems with identity and attestation mechanisms (e.g. SPIFFE/SPIRE)
# --- Securing Build Pipelines ---
- id: CNSC-149
  objective: Policy adherence is cryptographically guaranteed
  title: Cryptographic Policy Guarantee
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - The presence and output of each build step should be attested during the build. The CNCF maintains the in-toto project
    that can be used to secure a chain of pipeline stages end-to-end with cryptographic guarantees. Build metadata should
    be evaluated against the policy template by using tools such as Open Policy Agent.
- id: CNSC-150
  objective: Environments and dependencies are validated before usage
  title: Environment and Dependency Validation
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - The build environment's sources and dependencies must come from a secure, trusted source of truth. Checksums and any signatures
    should be validated both in the downloading or ingestion process, and again by the build worker. This should include validating
    package manager signatures, checking out specific Git commit hashes, and verifying SHA sums of input sources and binaries.
    After completing this validation, the downloading process should sign all binaries or libraries it is adding to the secure
    source
- id: CNSC-151
  objective: Runtime security of build workers is validated
  title: Build Worker Runtime Security
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - Out-of-band verification of runtime environment security, as defined by execution of policies using tools such as seccomp,
    AppArmor, and SELinux, provides defense in depth against attacks on build infrastructure. High privilege kernel capabilities
    such as debugger, device, and network attachments should be restricted and monitored.
- id: CNSC-152
  objective: Build artefacts are validated through verifiably reproducible builds
  title: Reproducible Builds
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - A verifiably reproducible build is a build process where, given a source code commit hash and a set of build instructions,
    an end user should be able to reproduce the built artefact bit for bit.
- id: CNSC-153
  objective: External requirements from the build process are locked and verified
  title: External Requirement Verification
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-154
  objective: Sources of non-determinism are found and eliminated
  title: Build Determinism
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - Reproducible-builds.org documents and offers solutions for many of these things. Diffoscope can be used to dig in and
    find the cause of differences when tracking down sources of non-determinism.
- id: CNSC-155
  objective: The build environment is recorded
  title: Build Environment Recording
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - Ensure best practices outlined in cloud native security paper are followed to deploy a secure orchestration layer
- id: CNSC-156
  objective: Creation of the build environment is automated
  title: Build Environment Automation
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-157
  objective: Builds are distributed across different infrastructure
  title: Build Distribution
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-158
  objective: Build and related CI/CD steps are automated through a pipeline delivered as code
  title: Pipeline as Code
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-159
  objective: Pipelines are standardized across projects
  title: Pipeline Standardization
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-160
  objective: A secured orchestration platform is provisioned to host the software factory
  title: Software Factory Platform
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-161
  objective: Build workers are single use
  title: Single-Use Build Workers
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-162
  objective: Software factory has minimal network connectivity
  title: Software Factory Network Isolation
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - The software factory should have no network connectivity other than to connect to the trusted sources of hardened source
    code, the dependency repository and code signing infrastructure.
- id: CNSC-163
  objective: Duties of each build worker are segregated
  title: Build Worker Duty Segregation
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-164
  objective: Build worker environment and commands are passed in
  title: Build Worker Environment Control
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - Inorder to limit hostile tooling and persistent impants from attackers, a Build Worker should start with a clean and isolated
    environmment. It should not be able to pull its own environment. Ensure environment variables and commands are explicitly
    passed to avoid any complicated and opaque build process
- id: CNSC-165
  objective: Output is written to a separate secured storage repo
  title: Secured Output Storage
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - The output artefact should be written to a separate shared storage from the inputs. A process separate from the Build
    Worker should then upload that artefact to an appropriate repository.
- id: CNSC-166
  objective: Pipeline modification is only allowed through pipeline as code
  title: Pipeline Modification Control
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
  recommendations:
  - The pipeline configuration (pipeline as code) should be immutable and any modification shouldn't be possible. This prevents
    attackers from interacting and modifying the configuration. This model then requires appropriate authentication and authorization
    to be in place for the software and configuration of the pipeline
- id: CNSC-167
  objective: User roles are defined
  title: User Role Definition
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-168
  objective: Established practices are followed for establishing a root of trust from an offline source
  title: Root of Trust Establishment
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
- id: CNSC-169
  objective: Short-lived workload certificates are used
  title: Short-Lived Certificates
  group: Securing Build Pipelines
  applicability:
  - SSCP-v1.0
# --- Securing Materials ---
- id: CNSC-173
  objective: Third party artefacts and open source libraries are verified
  title: Third-Party Artifact Verification
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - All third party artefacts, open source libraries and any other dependencies should be verified as part of the continuous
    integration pipeline by validating their checksums against a known good source and validating any cryptographic signatures.
    Any software ingested must be scanned using Software Composition Analysis (SCA) and pentesting tools to detect whether
    any vulnerable open-source software is used in the final product.
- id: CNSC-174
  objective: SBOM is required from third party suppliers
  title: Third-Party SBOM Requirements
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Where possible, vendors should be required to provide Software Bills of Materials (SBOMs) containing the explicit details
    of the software and versions used within the supplied product as it provides a clear and direct link to the dependencies.
- id: CNSC-175
  objective: Dependencies between open source components are tracked
  title: Dependency Tracking
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - A register should be maintained of a project's open source components, dependencies and vulnerabilities to help trace
    any deployed artefacts with new vulnerabilities. One of the most popular open source inventory implementations is OWASP
    Dependency-Track.
- id: CNSC-176
  objective: Libraries are built based upon source code
  title: Source-Based Library Builds
  group: Securing Materials
  applicability:
  - SSCP-v1.0
- id: CNSC-177
  objective: Trusted package managers and repositories are defined and prioritized
  title: Trusted Package Sources
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Organizations should host their own package managers and artefact repositories, and restrict build machines to pull from
    only those sources.
- id: CNSC-178
  objective: An immutable SBOM of the code is generated
  title: Immutable SBOM Generation
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - 'There are currently two well known SBOM specifications: SPDX and CycloneDX'
- id: CNSC-179
  objective: Software is scanned for vulnerabilities
  title: Software Vulnerability Scanning
  group: Securing Materials
  applicability:
  - SSCP-v1.0
- id: CNSC-180
  objective: Software is scanned for license implications
  title: License Compliance Scanning
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - Licensing obligations must also be factored into the ingestion process. The Linux Foundation maintains the Open Compliance
    Program which hosts several tools to ensure released software meets legal and regulatory compliance requirements.
- id: CNSC-181
  objective: Software composition analysis is run on ingested software
  title: Software Composition Analysis
  group: Securing Materials
  applicability:
  - SSCP-v1.0
  recommendations:
  - The SCA tool will attempt to use heuristics to identify the direct and transitive dependencies, and can also serve as
    verification of SBOM content. This data will then be matched against data from a number of data feeds containing vulnerability
    data to highlight any vulnerabilities in the dependent packages.
# --- Securing the Source Code ---
- id: CNSC-182
  objective: Commits and tags are signed
  title: Commit and Tag Signing
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - GPG keys or S/MIME certificates are used to sign the source code
- id: CNSC-183
  objective: Full attestation and verification is enforced for protected branches
  title: Branch Protection Attestation
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Branch protection is enabled on the mainline and release branches with force push disabled
- id: CNSC-184
  objective: Secrets are not committed to the source code repository unless encrypted
  title: Secret Commit Prevention
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Implement tooling to detect secrets or to prevent certain files from being pushed which may contain plaintext sensitive
    materials, such as via a .gitignore and/or .gitattributes file, client-side hook (pre-commit), server-side hook (pre-receive
    or update), and/or as a step in the CI process
- id: CNSC-185
  objective: Individuals or teams with write access to a repository are defined
  title: Repository Access Definition
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Implement codeowners (or equivalent)
- id: CNSC-186
  objective: Software security scanning and testing is automated
  title: Automated Security Scanning
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Security specific scans should be performed, including Static Application Security Tests (SAST) and Dynamic Application
    Security Tests (DAST). Both the coverage and results of these tests should be published as part of the repository information
    to help downstream consumers of software better assess the stability, reliability, and/or suitability of a product or
    library.
- id: CNSC-187
  objective: Contribution policies are established and adhered to
  title: Contribution Policy Enforcement
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Define configuration options or configuration rules witthin SCM platforms allow repository administrators to enforce security,
    hygiene and operational policies.
- id: CNSC-188
  objective: Roles are defined and aligned to functional responsibilities
  title: Functional Role Definition
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Define roles by using principle of least privileges to provide access based on function such as Developer, Maintainer,
    Owner, Reviewer, Approver, and Guest
- id: CNSC-189
  objective: An independent four-eyes principle is enforced
  title: Four-Eyes Principle
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - The author(s) of a request may not also be the approver of the request. At least two reviewers with equal or greater expertise
    should review & approve the request.
- id: CNSC-190
  objective: Branch protection rules are used
  title: Branch Protection Rules
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - SCM platforms allow the configuration and restriction of source code operations on individual branches. Protection rules
    can be used to enforce the usage of pull requests with specified precondition and approval rules, ensuring that a human
    code review process is followed or an automated status checking of a branch occurs. Additionally, protected branches can
    be used to disallow dangerous use of force pushes, preventing the overwrite of commit histories and potential obfuscation
    of code changes.
- id: CNSC-191
  objective: MFA is enforced for accessing source code repositories
  title: Repository MFA Enforcement
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
- id: CNSC-192
  objective: SSH keys are used to provide developers access to source code repositories
  title: SSH Key Access
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
- id: CNSC-193
  objective: A key rotation policy is maintained
  title: Key Rotation Policy
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - It is recommended to implement a key rotation policy to ensure that compromised keys will cease to be usable after a certain
    period of time. When a private key is known to have been compromised, it should be revoked and replaced immediately to
    shut off access for any unauthorized user. Organizations may also consider using short lived certificates or keys, which
    reduces the reliance on certificate revocation systems.
- id: CNSC-194
  objective: Short-lived or ephemeral credentials are used for machine and service access
  title: Ephemeral Credentials
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Short-life credential issuance encourages the use of fine grained permissions and automation in provisioning access tokens.
    For CI/CD pipeline agents, short-lived access tokens should be considered instead of password-based credentials. The use
    of very short-lived tokens like OAuth 2.0, OpenID Connect, etc., will help to implement more secure access and increase
    the security assurance.
